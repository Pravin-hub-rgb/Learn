const storage_key = 'nxjs_roadmap_v1';

function loadChecked() {
  try { return JSON.parse(localStorage.getItem(storage_key) || '{}'); } catch { return {}; }
}

function saveChecked(state) {
  try { localStorage.setItem(storage_key, JSON.stringify(state)); } catch {}
}

let checked = loadChecked();
let openPhases = {};

function getAllTopics() {
  let all = [];
  PHASES.forEach(p => p.sections.forEach(s => s.topics.forEach(t => all.push(p.id + '::' + t))));
  return all;
}

function getPhaseTopics(phase) {
  let all = [];
  phase.sections.forEach(s => s.topics.forEach(t => all.push(phase.id + '::' + t)));
  return all;
}

function countChecked(keys) {
  return keys.filter(k => checked[k]).length;
}

function render() {
  const app = document.getElementById('app');
  const allKeys = getAllTopics();
  const totalChecked = countChecked(allKeys);
  const total = allKeys.length;
  const pct = total ? Math.round(totalChecked / total * 100) : 0;

  let html = `
    <div class="global-stats">
      <div class="stat-card"><div class="stat-label">Topics completed</div><div class="stat-value">${totalChecked} / ${total}</div></div>
      <div class="stat-card"><div class="stat-label">Overall progress</div><div class="stat-value">${pct}%</div></div>
      <div class="stat-card"><div class="stat-label">Phases</div><div class="stat-value">${PHASES.length}</div></div>
    </div>
    <button class="reset-btn" onclick="resetAll()">Reset all progress</button>
  `;

  PHASES.forEach((phase, pi) => {
    const phaseKeys = getPhaseTopics(phase);
    const phaseChecked = countChecked(phaseKeys);
    const phaseTotal = phaseKeys.length;
    const phasePct = phaseTotal ? Math.round(phaseChecked / phaseTotal * 100) : 0;
    const isOpen = openPhases[phase.id] !== false;

    html += `
      <div class="phase-card">
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${phasePct}%; background:${phase.color};"></div></div>
        <div class="phase-header" onclick="togglePhase('${phase.id}')">
          <div class="phase-left">
            <span class="phase-badge" style="background:${phase.fillColor}; color:${phase.textColor};">Phase ${pi + 1}</span>
            <span class="phase-title">${phase.title.replace(/Phase \d+ — /, '')}</span>
          </div>
          <div class="phase-meta">
            <span class="progress-pill">${phaseChecked}/${phaseTotal}</span>
            <span class="chevron ${isOpen ? 'open' : ''}">▼</span>
          </div>
        </div>
    `;

    if (isOpen) {
      html += `<div class="phase-body">`;
      phase.sections.forEach(section => {
        html += `<div class="section"><div class="section-title">${section.title}</div>`;
        section.topics.forEach(topic => {
          const key = phase.id + '::' + topic;
          const isChecked = !!checked[key];
          html += `
            <label class="topic-item ${isChecked ? 'checked' : ''}">
              <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggle('${key}', this.checked)">
              <span class="topic-label">${topic}</span>
            </label>
          `;
        });
        html += `</div>`;
      });
      html += `</div>`;
    }

    html += `</div>`;
  });

  app.innerHTML = html;
}

function toggle(key, val) {
  checked[key] = val;
  saveChecked(checked);
  render();
}

function togglePhase(id) {
  openPhases[id] = openPhases[id] === false ? true : false;
  render();
}

function resetAll() {
  if (confirm('Reset all progress?')) {
    checked = {};
    saveChecked(checked);
    render();
  }
}

render();
</script>
